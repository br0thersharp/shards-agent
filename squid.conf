http_port 3128

acl localnet src 172.16.0.0/12

acl SSL_ports port 443
acl CONNECT method CONNECT
http_access deny CONNECT !SSL_ports

acl allowed_ssl dstdomain \
  .play-shards.com \
  .openai.com \
  .chat.openai.com \
  .oaistatic.com \
  .oaiusercontent.com

http_access allow localnet CONNECT allowed_ssl
http_access allow localnet allowed_ssl

http_access deny all

access_log stdio:/var/log/squid/access.log
cache deny all